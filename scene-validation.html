<!DOCTYPE html>

<meta charset="UTF-8">

<title>Odyssey 2026 — Image Review Table</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px;max-width:1400px;margin:0 auto}
h1{color:#f5c518;font-size:1.5rem;margin-bottom:4px}
.sub{color:#888;font-size:.85rem;margin-bottom:16px}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar button,.toolbar label{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:.85rem}
.btn-primary{background:#f5c518;color:#111;font-weight:700}
.btn-primary:hover{background:#ffd633}
.btn-secondary{background:#333;color:#e0e0e0}
.btn-secondary:hover{background:#444}
.btn-danger{background:#c0392b;color:#fff}
.btn-danger:hover{background:#e74c3c}
#searchInput{padding:8px 12px;background:#222;border:1px solid #444;color:#e0e0e0;border-radius:4px;min-width:200px;font-size:.85rem}
#searchInput::placeholder{color:#666}
.summary{font-size:.85rem;color:#aaa;margin-bottom:8px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{position:sticky;top:0;z-index:2}
th{background:#1a1a1a;color:#f5c518;padding:10px 8px;text-align:left;font-weight:600;font-size:.8rem;border-bottom:2px solid #333;text-transform:uppercase;letter-spacing:.5px}
th:nth-child(1){width:240px}
th:nth-child(2){width:35%}
th:nth-child(3){width:auto}
td{padding:8px;border-bottom:1px solid #222;vertical-align:middle;font-size:.82rem}
td.img-cell{text-align:center;background:#111}
td.img-cell img{max-width:220px;max-height:140px;border-radius:4px;cursor:pointer;transition:transform .15s;display:block;margin:0 auto}
td.img-cell img:hover{transform:scale(1.05)}
td.img-cell .index-label{display:block;color:#666;font-size:.7rem;margin-top:2px}
td.desc-cell textarea{width:100%;min-height:56px;padding:6px 8px;background:#1a1a1a;border:1px solid #333;color:#e0e0e0;border-radius:3px;font-size:.82rem;font-family:inherit;resize:vertical}
td.desc-cell textarea:focus{outline:1px solid #f5c518;border-color:#f5c518}
td.desc-cell textarea.my-desc{background:#111;border-color:#2a2a2a;color:#aaa;cursor:default}
td.desc-cell textarea.my-desc:focus{outline:none;border-color:#2a2a2a}
td.corr-cell textarea{width:100%;min-height:56px;padding:6px 8px;background:#0d0d0d;border:1px solid #555;color:#e0e0e0;border-radius:3px;font-size:.82rem;font-family:inherit;resize:vertical}
td.corr-cell textarea:focus{outline:1px solid #f5c518;border-color:#f5c518}
tr:hover td{background:#1a1a1a}
tr:hover td.img-cell{background:#151515}
tr.reviewed td{background:#1a2a1a}
tr.reviewed td.corr-cell textarea{border-color:#2a5a2a}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status-new{background:#f5c518}
.status-known{background:#2ecc71}
.status-unknown{background:#e67e22}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{padding:4px 10px;border:1px solid #444;border-radius:12px;background:transparent;color:#aaa;cursor:pointer;font-size:.75rem}
.filter-btn.active{background:#f5c518;color:#111;border-color:#f5c518;font-weight:600}
@media(max-width:768px){th:nth-child(1){width:140px}td.img-cell img{max-width:120px;max-height:80px}}
</style>

  <button type="button" class="btn-primary" onclick="exportJSON()">&#x2B07; Export Corrections (JSON)</button>
  <button type="button" class="btn-secondary" onclick="exportCSV()">&#x2B07; Export CSV</button>
  <button type="button" class="btn-secondary" onclick="clearAll()">&#x2716; Clear All Corrections</button>
  <input type="text" id="searchInput" placeholder="Search images..." oninput="filterTable()">
  <label style="color:#888;font-size:.8rem">
    <input type="checkbox" onchange="toggleReviewedOnly()"> Reviewed only
  </label>
</div>

<div class="filter-bar" id="filterBar"></div>

<div class="summary" id="summary"></div>

      <th>Image</th>

  </thead>

// ===================== TABLE RENDERING =====================
let corrections = {};  // id -> user's correction text
let reviewedOnly = false;

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  tbody.innerHTML = '';

  let visibleCount = 0;
  images.forEach(img => {
    const hasCorrection = corrections[img.id] && corrections[img.id].trim();
    if (reviewedOnly && !hasCorrection) return;
    if (query && !img.id.toLowerCase().includes(query) && !img.desc.toLowerCase().includes(query)) return;

    visibleCount++;
    const tr = document.createElement('tr');
    if (hasCorrection) tr.className = 'reviewed';

    // Source label
    const isLocal = img.id.startsWith('imdb-') && !img.src.includes('m.media-amazon.com');
    const isUniversal = img.id.startsWith('universal');
    const isBritannica = img.id.startsWith('britannica');
    const isNewAmazon = img.id.startsWith('imdb-') && img.src.includes('m.media-amazon.com');
    let label = '';
    if (isLocal) label = 'IMDb local';
    else if (isUniversal) label = 'Universal pic';
    else if (isBritannica) label = 'Britannica';
    else if (isNewAmazon) label = 'IMDb CDN';

    // Status dot
    const known = !img.desc.includes('needs identification');
    const statusDotClass = known ? 'status-known' : 'status-unknown';

    tr.innerHTML = `
      <td class="img-cell">
        <span class="status-dot ${statusDotClass}"></span>
        <img src="${img.src}" alt="${img.alt}" loading="lazy" onerror="this.style.opacity='0.3'">
        <span class="index-label">${img.id}${label ? ' &middot; ' + label : ''}</span>
      </td>
      <td class="desc-cell">
        <textarea class="my-desc" readonly rows="2">${img.desc}</textarea>
      </td>
      <td class="corr-cell">
        <textarea rows="2" placeholder="Write your correction here..." oninput="onCorrection(this, '${img.id}')">${corrections[img.id] || ''}</textarea>
      </td>
    `;
    tbody.appendChild(tr);
  });

  const total = images.length;
  const reviewed = Object.keys(corrections).filter(k => corrections[k].trim()).length;
  document.getElementById('summary').textContent =
    `Showing ${visibleCount} of ${total} images | ${reviewed} reviewed`;
  updateFilterBar();
}

function onCorrection(el, id) {
  const value = el.value;
  if (value.trim()) corrections[id] = value;
  else delete corrections[id];
  // Update just this row — no full re-render, no focus loss
  const tr = el.closest('tr');
  if (tr) tr.className = value.trim() ? 'reviewed' : '';
  updateSummary();
}

function updateSummary() {
  const total = images.length;
  const visible = document.getElementById('tableBody').children.length;
  const reviewed = Object.keys(corrections).filter(k => corrections[k].trim()).length;
  document.getElementById('summary').textContent =
    `Showing ${visible} of ${total} images | ${reviewed} reviewed`;
}

// ===================== FILTERS =====================
function filterTable() { renderTable(); }
function toggleReviewedOnly() {
  reviewedOnly = !reviewedOnly;
  renderTable();
}

// Source category filter
const categories = ['all', 'local-stills', 'universal', 'imdb-cdn', 'britannica', 'unknown', 'known'];
const catLabels = { 'all':'All', 'local-stills':'Local Stills', 'universal':'Universal', 'imdb-cdn':'IMDb CDN', 'britannica':'Britannica', 'unknown':'Unknown', 'known':'Known' };

function updateFilterBar() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = categories.map(c =>
    `<button class="filter-btn ${c === activeFilter ? 'active' : ''}" onclick="setFilter('${c}')">${catLabels[c]}</button>`
  ).join('');
}

let activeFilter = 'all';

function setFilter(cat) {
  activeFilter = cat;
  const tbody = document.getElementById('tableBody');
  const rows = tbody.querySelectorAll('tr');
  rows.forEach((row, i) => {
    const img = images.find(img => img.id === (row.cells[0]?.querySelector('.index-label')?.textContent?.split('·')[0]?.trim()));
    if (!img) { row.style.display = ''; return; }
    const isLocal = img.id.startsWith('imdb-') && !img.src.includes('m.media-amazon.com');
    const isUniversal = img.id.startsWith('universal');
    const isBritannica = img.id.startsWith('britannica');
    const isNewAmazon = img.id.startsWith('imdb-') && img.src.includes('m.media-amazon.com');
    const known = !img.desc.includes('needs identification');

    let show = true;
    if (cat === 'local-stills') show = isLocal;
    else if (cat === 'universal') show = isUniversal;
    else if (cat === 'imdb-cdn') show = isNewAmazon;
    else if (cat === 'britannica') show = isBritannica;
    else if (cat === 'unknown') show = !known;
    else if (cat === 'known') show = known;
    row.style.display = show ? '' : 'none';
  });
  updateFilterBar();
}

// ===================== EXPORT =====================
function exportJSON() {
  const result = {};
  images.forEach(img => {
    const correction = corrections[img.id];
    if (correction && correction.trim()) {
      result[img.id] = {
        my_description: img.desc,
        correction: correction.trim()
      };
    }
  });
  const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
  downloadBlob(blob, 'odyssey-image-corrections.json');
}

function exportCSV() {
  let csv = 'id,my_description,correction\n';
  images.forEach(img => {
    const corr = (corrections[img.id] || '').replace(/"/g, '""');
    const desc = img.desc.replace(/"/g, '""');
    csv += `"${img.id}","${desc}","${corr}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  downloadBlob(blob, 'odyssey-image-corrections.csv');
}

function downloadBlob(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function clearAll() {
  if (!confirm('Clear all correction entries?')) return;
  corrections = {};
  renderTable();
}

// ===================== INIT =====================
renderTable();
